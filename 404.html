<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>404 - Halaman Tidak Ditemukan | Flixora</title>
    <meta name="description" content="Halaman yang Anda cari tidak ditemukan di Flixora.">
    
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3B82F6">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-color: #FFFFFF;
            --surface-color: #F9FAFB;
            --primary-text-color: #111827;
            --secondary-text-color: #6B7280;
            --border-color: #E5E7EB;
            --accent-color: #3B82F6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --font-family: 'Manrope', sans-serif;
        }

        body.dark-mode {
            --bg-color: #111827;
            --surface-color: #1F2937;
            --primary-text-color: #F9FAFB;
            --secondary-text-color: #9CA3AF;
            --border-color: #374151;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--surface-color);
            color: var(--primary-text-color);
            font-family: var(--font-family);
            transition: background-color 0.3s ease, color 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HEADER & NAVBAR (SAMA PERSIS DENGAN INDEX) */
        .main-header {
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .navbar { display: flex; align-items: center; justify-content: space-between; position: relative; height: 42px; }
        .logo { font-size: 1.8rem; font-weight: 800; text-decoration: none; color: var(--primary-text-color); }
        .logo span { color: var(--accent-color); }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .action-button { display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; border-radius: 50%; padding: 5px; color: var(--primary-text-color); }
        
        .desktop-nav { display: none; }
        @media (min-width: 992px) {
            .desktop-nav { display: block; margin: 0 auto; } 
        }
        .nav-menu { list-style: none; display: flex; gap: 30px; align-items: center; }
        .nav-link { text-decoration: none; color: var(--secondary-text-color); font-weight: 600; font-size: 1rem; padding: 10px 5px; transition: color 0.2s ease; display: flex; align-items: center; gap: 5px; }
        .nav-link:hover { color: var(--primary-text-color); }

        /* AREA ERROR 404 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        
        .error-wrapper {
            text-align: center;
            padding: 40px 20px;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            color: var(--accent-color);
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--accent-glow));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: var(--primary-text-color);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-text-color);
            margin-bottom: 15px;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--secondary-text-color);
            max-width: 450px;
            margin: 0 auto 35px auto;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-home:hover {
            background-color: #2563EB;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        /* FOOTER */
        .main-footer {
            padding: 30px 0;
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.5rem; }
            .error-icon { width: 80px; height: 80px; }
        }
    </style>
</head>
<body class="dark-mode">

    <script src="https://unpkg.com/lucide@latest"></script>

    <header class="main-header">
        <div class="container">
            <div class="navbar">
                <a href="../../../../../" class="logo">Flix<span>ora</span></a>
                <nav class="desktop-nav">
                    <ul class="nav-menu">
                        <li class="nav-item"><a href="index.html" class="nav-link"><i data-lucide="home"></i> Home</a></li>
                        <li class="nav-item"><a href="request.html" class="nav-link"><i data-lucide="plus-circle"></i> Request</a></li>
                    </ul>
                </nav>
                <div class="nav-right">
                    <button class="action-button" id="theme-toggle-btn" aria-label="Toggle Theme">
                        <i class="icon-sun" data-lucide="sun" style="display: none;"></i>
                        <i class="icon-moon" data-lucide="moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="error-wrapper">
                <i data-lucide="ghost" class="error-icon"></i>
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Halaman Tidak Ditemukan</h2>
                <p class="error-desc">Waduh! Sepertinya kamu nyasar. Halaman yang kamu cari mungkin sudah dihapus, diubah namanya, atau tidak pernah ada.</p>
                <a href="../../../../../" class="btn-home">
                    <i data-lucide="arrow-left"></i> Kembali ke Beranda
                </a>
            </div>
        </div>
    </main>
    
    <footer class="main-footer">
        <div class="container">
            <p>&copy; <span id="copyright-year"></span> Flixora. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Render Icons
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            // Set Copyright Year Auto
            document.getElementById('copyright-year').textContent = new Date().getFullYear();

            // Fitur Toggle Tema (Gelap/Terang)
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const sunIcon = themeToggleBtn.querySelector('.icon-sun');
            const moonIcon = themeToggleBtn.querySelector('.icon-moon');

            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'block';
                } else {
                    document.body.classList.remove('dark-mode');
                    sunIcon.style.display = 'block';
                    moonIcon.style.display = 'none';
                }
            };

            // Cek history tema di local storage, jika tidak ada default ke dark
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                applyTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            });
        });
    </script>
</body>
</html>
