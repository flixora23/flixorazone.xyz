<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton di Flixora</title>
    <meta name="description" content="Streaming anime, donghua, dan film bioskop terbaru dengan subtitle Indonesia.">
    <link rel="icon" href="../../icon.png" type="image/png">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#1F2937">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
        html { background-color: #1F2937; scroll-behavior: smooth; }
        :root { --bg-color: #FFFFFF; --surface-color: #F9FAFB; --primary-text-color: #111827; --secondary-text-color: #6B7280; --border-color: #E5E7EB; --accent-color: #3B82F6; --accent-glow: rgba(59, 130, 246, 0.4); --font-family: 'Manrope', sans-serif; }
        body.dark-mode { --bg-color: #111827; --surface-color: #1F2937; --primary-text-color: #F9FAFB; --secondary-text-color: #9CA3AF; --border-color: #374151; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--surface-color); color: var(--primary-text-color); font-family: var(--font-family); transition: background-color 0.3s ease, color 0.3s ease; user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: auto; -webkit-user-select: auto; }
        .container { width: 90%; max-width: 1400px; margin: 0 auto; }
        *:focus, *:focus-visible { outline: none; }
        .action-button:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); }
        #search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--accent-glow); }
        .main-header { background-color: var(--bg-color); border-bottom: 1px solid var(--border-color); padding: 15px 0; position: sticky; top: 0; z-index: 999; }
        .navbar { display: flex; align-items: center; justify-content: space-between; position: relative; height: 42px; }
        .header-main-view, .header-search-view { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease; background-color: var(--bg-color); }
        .logo { font-size: 1.8rem; font-weight: 800; text-decoration: none; color: var(--primary-text-color); flex-shrink: 0; }
        .logo span { color: var(--accent-color); }
        .logo a { text-decoration: none; color: inherit; }
        .nav-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .action-button { display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; border-radius: 50%; padding: 6px; color: var(--primary-text-color); transition: background-color 0.2s; }
        .action-button:hover { background-color: var(--surface-color); }
        .desktop-nav { display: none; }
        @media (min-width: 992px) { .desktop-nav { display: block; margin: 0 auto; } .mobile-menu-toggle { display: none !important; } }
        .nav-menu { list-style: none; display: flex; gap: 30px; align-items: center; }
        .nav-link { text-decoration: none; color: var(--secondary-text-color); font-weight: 600; font-size: 1rem; padding: 10px 5px; transition: color 0.2s ease; display: flex; align-items: center; gap: 6px; }
        .nav-link:hover, .nav-link.active { color: var(--primary-text-color); }
        .header-search-view { transform: scale(1.1); opacity: 0; pointer-events: none; gap: 15px; }
        #search-input { width: 100%; flex-grow: 1; padding: 10px 18px; font-size: 0.95rem; border-radius: 25px; border: 1px solid var(--border-color); background-color: var(--surface-color); color: var(--primary-text-color); }
        .navbar.search-active .header-main-view { transform: scale(0.9); opacity: 0; pointer-events: none; }
        .navbar.search-active .header-search-view { transform: scale(1); opacity: 1; pointer-events: auto; }
        
        .mobile-nav { display: none; position: absolute; top: calc(100% + 1px); left: 0; width: 100%; background-color: var(--bg-color); border-bottom: 1px solid var(--border-color); padding: 0; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .mobile-nav.active { display: block; }
        .mobile-nav .nav-menu { flex-direction: column; gap: 0; }
        .mobile-nav .nav-item { width: 100%; }
        .mobile-nav .nav-link { display: flex; align-items: center; gap: 12px; color: var(--secondary-text-color); font-weight: 600; padding: 16px 5%; width: 100%; border-bottom: 1px solid var(--border-color); }
        .mobile-nav .nav-item:last-child .nav-link { border-bottom: none; }
        
        main { padding: 30px 0; }
        .player-section { width: 100%; max-width: 1100px; margin: 0 auto 40px auto; }
        .player-title { font-size: 1.3rem; font-weight: 800; color: var(--primary-text-color); margin-bottom: 16px; line-height: 1.3; display: flex; align-items: center; gap: 10px; }
        @media (min-width: 768px) { .player-title { font-size: 1.65rem; } }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; background-color: #000; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .episode-section { margin-top: 24px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; }
        .episode-header { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; color: var(--primary-text-color); margin-bottom: 15px; font-weight: 800; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .episode-list::-webkit-scrollbar { width: 6px; }
        .episode-list::-webkit-scrollbar-track { background: var(--surface-color); border-radius: 10px; }
        .episode-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .ep-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 5px; background-color: var(--surface-color); border: 1px solid var(--border-color); color: var(--primary-text-color); border-radius: 12px; font-weight: 700; font-size: 1.1rem; text-decoration: none; transition: all 0.2s; }
        .ep-btn .ep-lbl { font-size: 0.7rem; font-weight: 800; opacity: 0.7; margin-bottom: 2px; }
        .ep-btn:hover { background-color: var(--border-color); transform: translateY(-2px); }
        .ep-btn.active { background-color: var(--accent-color); color: #FFFFFF; border-color: var(--accent-color); box-shadow: 0 4px 12px var(--accent-glow); pointer-events: none; }
        
        .section-title-wrapper { display: flex; align-items: center; text-align: center; margin: 40px 0 25px 0; }
        .section-title-wrapper::before, .section-title-wrapper::after { content: ''; flex: 1; border-bottom: 2px solid var(--border-color); }
        .section-title-wrapper h2 { font-size: 1.35rem; font-weight: 800; padding: 0 20px; color: var(--primary-text-color); text-transform: uppercase; }
        .content-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        @media (min-width: 768px) { .content-grid { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; } }
        @media (min-width: 1024px) { .content-grid { grid-template-columns: repeat(6, 1fr); } }
        .thumbnail-card { background-color: var(--bg-color); border-radius: 10px; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.25s ease; display: flex; flex-direction: column; border: 1px solid var(--border-color); cursor: pointer; }
        .thumbnail-card:hover { transform: translateY(-6px); }
        .thumbnail-card a { text-decoration: none; display: flex; flex-direction: column; height: 100%; }
        .thumbnail-image-container { position: relative; width: 100%; aspect-ratio: 3 / 4; overflow: hidden; background-color: var(--surface-color); }
        .thumbnail-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .ep-badge { position: absolute; top: 8px; right: 8px; background-color: var(--accent-color); color: white; font-size: 0.75rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 2; }
        .movie-badge { background-color: #E11D48 !important; }
        .card-title-container { padding: 12px 10px; flex-grow: 1; display: flex; align-items: flex-start; justify-content: center; }
        .card-title { font-size: 0.85rem; font-weight: 700; color: var(--primary-text-color); text-align: center; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        #search-results-container { display: none; margin-top: 20px; }
        #no-results-message { display: none; text-align: center; padding: 50px 0; color: var(--secondary-text-color); grid-column: 1 / -1; }
        
        .main-footer { padding: 40px 0 25px 0; text-align: center; font-size: 0.85rem; color: var(--secondary-text-color); border-top: 1px solid var(--border-color); margin-top: 50px; }
    </style>
</head>
<body class="dark-mode">
    <script src="https://unpkg.com/lucide@latest"></script>

    <header class="main-header">
        <div class="container">
            <div class="navbar" id="navbar">
                <div class="header-main-view">
                    <div class="logo"><a href="../../../../../">Flix<span>ora</span></a></div>
                    <nav class="desktop-nav">
                        <ul class="nav-menu">
                            <li class="nav-item"><a href="../../../../../" class="nav-link active"><i data-lucide="home"></i> Home</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div id="player-section" class="player-section">
                <h1 id="dynamic-title" class="player-title"><i data-lucide="play-circle"></i> Memuat Judul...</h1>
                <div class="video-container">
                    <iframe src="https://ghhu.mp4" allowfullscreen></iframe>
                </div>
                <div id="episode-section" class="episode-section" style="display: none;">
                    <div class="episode-header">
                        <i data-lucide="list-video"></i> Daftar Episode
                    </div>
                    <div id="episode-list" class="episode-list">
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
