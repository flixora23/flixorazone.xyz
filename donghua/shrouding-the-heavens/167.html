    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', async () => {
            const copyrightYear = document.getElementById('copyright-year');
            if(copyrightYear) copyrightYear.textContent = new Date().getFullYear();

            const pathArray = window.location.pathname.split('/').filter(p => p !== '');
            if (pathArray.length < 2) return;
            
            const fileName = pathArray.pop();
            const folderName = pathArray.pop();
            const categoryName = pathArray.pop() || 'anime';

            const formatText = (str) => str.split(/[-_]/).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            const cleanTitle = formatText(decodeURIComponent(folderName));
            let currentEp = '';
            
            if (fileName && fileName.endsWith('.html') && fileName !== 'index.html' && fileName !== '0.html') {
                currentEp = fileName.replace('.html', '');
                document.getElementById('dynamic-title').innerHTML = `<i data-lucide="play-circle"></i> ${cleanTitle} Episode ${currentEp}`;
            } else {
                document.getElementById('dynamic-title').innerHTML = `<i data-lucide="film"></i> ${cleanTitle} (MOVIE)`;
            }
            lucide.createIcons();

            const repoUser = GH_CONFIG.USER;
            const repoName = GH_CONFIG.REPO;
            
            try {
                const epRes = await fetch(`https://api.github.com/repos/${repoUser}/${repoName}/contents/${categoryName}/${folderName}`);
                if (epRes.ok) {
                    const epData = await epRes.json();
                    const episodes = epData
                        .filter(item => item.name.endsWith('.html') && item.name !== 'index.html' && item.name !== '0.html')
                        .map(item => parseInt(item.name.replace('.html', '')))
                        .filter(num => !isNaN(num))
                        .sort((a, b) => a - b); 

                    if (episodes.length > 0) {
                        const epListEl = document.getElementById('episode-list');
                        episodes.forEach(ep => {
                            const isAct = (ep.toString() === currentEp) ? 'active' : '';
                            epListEl.innerHTML += `
                                <a href="${ep}.html" class="ep-btn ${isAct}">
                                    <span class="ep-lbl">EP</span>
                                    <span>${ep}</span>
                                </a>`;
                        });
                        document.getElementById('episode-section').style.display = 'block';
                    }
                }
            } catch (error) { console.error("Gagal load episode", error); }

            let allCardsData = [];
            let categoryData = { anime: [], donghua: [], bioskop: [], drakor: [], dracin: [] };
            
            try {
                const recRes = await fetch(`https://api.github.com/repos/${repoUser}/${repoName}/git/trees/main?recursive=1`);
                if (recRes.ok) {
                    const data = await recRes.json();
                    const allowedCategories = ['anime', 'donghua', 'bioskop', 'drakor', 'dracin'];
                    const db = {};
                    allowedCategories.forEach(c => db[c] = {});

                    data.tree.forEach(item => {
                        const parts = item.path.split('/');
                        if (parts.length >= 2) {
                            const cat = parts[0].toLowerCase();
                            const fold = parts[1];
                            if (allowedCategories.includes(cat)) {
                                if (!db[cat][fold]) db[cat][fold] = { maxEp: 0, hasThumb: false };
                                if (parts.length === 3) {
                                    if (parts[2] === 'thumb.jpg') db[cat][fold].hasThumb = true;
                                    else if (parts[2].endsWith('.html') && parts[2] !== 'index.html' && parts[2] !== '0.html') {
                                        const ep = parseInt(parts[2].replace('.html', ''));
                                        if (!isNaN(ep) && ep > db[cat][fold].maxEp) db[cat][fold].maxEp = ep;
                                    }
                                }
                            }
                        }
                    });

                    const cacheBuster = new Date().getTime();
                    for (const cat of allowedCategories) {
                        for (const [fold, info] of Object.entries(db[cat])) {
                            if (!info.hasThumb) continue;
                            const title = formatText(decodeURIComponent(fold));
                            let targetHtml = info.maxEp > 0 ? `${info.maxEp}.html` : `index.html`;
                            let badgeHtml = info.maxEp > 0 ? `<div class="ep-badge">EPS ${info.maxEp}</div>` : `<div class="ep-badge movie-badge">MOVIE</div>`;
                            const thumbUrl = `../../${cat}/${encodeURIComponent(fold)}/thumb.jpg?t=${cacheBuster}`;
                            const linkUrl = `../../${cat}/${encodeURIComponent(fold)}/${targetHtml}`;

                            const cardHtml = `
                                <div class="thumbnail-card" onclick="window.location.href='${linkUrl}'">
                                    <a href="${linkUrl}">
                                        <div class="thumbnail-image-container">
                                            <img src="${thumbUrl}" alt="${title}" class="thumbnail-image">
                                            ${badgeHtml}
                                        </div>
                                        <div class="card-title-container">
                                            <h3 class="card-title">${title}</h3>
                                        </div>
                                    </a>
                                </div>`;
                            
                            const cardObj = { title: title.toLowerCase(), html: cardHtml };
                            allCardsData.push(cardObj);
                            categoryData[cat].push(cardObj);
                        }
                    }

                    if (categoryData[categoryName] && categoryData[categoryName].length > 0) {
                        let catTitle = categoryName === 'bioskop' ? 'MOVIES' : categoryName.toUpperCase();
                        document.getElementById('rekomendasi-title').innerText = `RECOMMENDED ${catTitle}`;
                        
                        let shuffledCurrent = [...categoryData[categoryName]].sort(() => 0.5 - Math.random());
                        document.getElementById('rekomendasi-grid').innerHTML = shuffledCurrent.slice(0, 12).map(c => c.html).join('');
                        document.getElementById('rekomendasi-section').style.display = 'block';
                    }

                    const otherCatsContainer = document.getElementById('other-categories-container');
                    allowedCategories.forEach(cat => {
                        if (cat !== categoryName && categoryData[cat] && categoryData[cat].length > 0) {
                            let catTitle = cat === 'bioskop' ? 'MOVIES' : cat.toUpperCase();
                            let section = document.createElement('section');
                            section.className = 'other-category-section';
                            
                            let shuffledCat = [...categoryData[cat]].sort(() => 0.5 - Math.random());
                            
                            section.innerHTML = `
                                <div class="section-title-wrapper" style="margin-top: 50px;">
                                    <h2>${catTitle}</h2>
                                </div>
                                <div class="content-grid">
                                    ${shuffledCat.slice(0, 12).map(c => c.html).join('')}
                                </div>
                            `;
                            otherCatsContainer.appendChild(section);
                        }
                    });
                }
            } catch (error) { console.error("Gagal load rekomendasi", error); }

            const searchInput = document.getElementById('search-input');
            const searchOpenBtn = document.getElementById('search-open-btn');
            const searchCloseBtn = document.getElementById('search-close-btn');
            const navbar = document.getElementById('navbar');
            const playerSection = document.getElementById('player-section');
            const rekomendasiSection = document.getElementById('rekomendasi-section');
            const otherCatsContainer = document.getElementById('other-categories-container');
            const searchResultsContainer = document.getElementById('search-results-container');
            const searchGrid = document.getElementById('search-grid');
            const noResultsMessage = document.getElementById('no-results-message');

            const manageLayout = () => {
                const query = searchInput.value.toLowerCase().trim();
                if (query) {
                    playerSection.style.display = 'none';
                    if(rekomendasiSection) rekomendasiSection.style.display = 'none';
                    if(otherCatsContainer) otherCatsContainer.style.display = 'none';
                    searchResultsContainer.style.display = 'block';
                    
                    const filtered = allCardsData.filter(card => card.title.includes(query));
                    searchGrid.innerHTML = filtered.map(c => c.html).join('');
                    noResultsMessage.style.display = filtered.length === 0 ? 'block' : 'none';
                } else {
                    playerSection.style.display = 'block';
                    if(rekomendasiSection) rekomendasiSection.style.display = 'block';
                    if(otherCatsContainer) otherCatsContainer.style.display = 'block';
                    searchResultsContainer.style.display = 'none';
                }
            };

            searchInput.addEventListener('input', manageLayout);
            searchOpenBtn.addEventListener('click', () => {
                 navbar.classList.add('search-active');
                 searchInput.focus();
            });
            searchCloseBtn.addEventListener('click', () => {
                navbar.classList.remove('search-active');
                searchInput.value = '';
                manageLayout(); 
            });

            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const sunIcon = themeToggleBtn.querySelector('.icon-sun');
            const moonIcon = themeToggleBtn.querySelector('.icon-moon');
            
            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'block';
                } else {
                    document.body.classList.remove('dark-mode');
                    sunIcon.style.display = 'block';
                    moonIcon.style.display = 'none';
                }
            };
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                applyTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            });

            const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenuToggle.addEventListener('click', () => mobileMenu.classList.toggle('active'));

            const scrollToTopBtn = document.getElementById('scroll-to-top-btn');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) scrollToTopBtn.classList.add('visible');
                else scrollToTopBtn.classList.remove('visible');
            });
            scrollToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        });
    </script>
    <script>loadSocialBar();</script>
</body>
</html>
